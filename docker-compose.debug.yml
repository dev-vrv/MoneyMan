services:
  postgres:
    image: postgres:16-alpine
    container_name: fin-man-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fin_man
      POSTGRES_USER: fin_man
      POSTGRES_PASSWORD: fin_man
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin_man -d fin_man"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fin-man-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    container_name: fin-man-backend
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    container_name: fin-man-celery-worker
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    container_name: fin-man-celery-beat
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command: celery -A backend beat -l info
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.debug
    container_name: fin-man-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: fin-man-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/debug.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
